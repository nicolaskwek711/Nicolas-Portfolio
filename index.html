<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nicolas Kwek — Visual Storyteller</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #fff;
            color: #000;
        }

        .main-container {
            width: 100%;
            height: 100%;
            min-height: 500px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header-section {
            padding-top: 5rem;
            text-align: center;
            width: 100%;
            position: relative;
            z-index: 20;
        }

        .main-title {
            font-size: clamp(3.5rem, 10vw, 8rem);
            line-height: 1;
            font-style: italic;
            cursor: default;
            display: inline-block;
        }

        .bubble-char {
            display: inline-block;
            transition: font-weight 0.25s ease, color 0.25s ease;
            font-weight: 300;
            color: #bbb;
        }

        .bubble-char.dist-0 {
            font-weight: 900;
            color: #000;
        }

        .bubble-char.dist-1 {
            font-weight: 600;
            color: #444;
        }

        .bubble-char.dist-2 {
            font-weight: 400;
            color: #777;
        }

        .subtitle {
            padding-top: 1rem;
            font-size: clamp(1rem, 3vw, 2rem);
            color: #999;
        }

        /* Physics canvas sits BEHIND the header */
        .physics-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        /* Re-enable pointer events only on the matter canvas for dragging */
        .physics-container canvas {
            pointer-events: all;
        }

        .block {
            position: absolute;
            padding: 1.5rem 3.5rem;
            border-radius: 9999px;
            color: #fff;
            font-size: clamp(1.5rem, 3vw, 2.5rem);
            font-weight: 600;
            user-select: none;
            pointer-events: none;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            transition: box-shadow 0.3s ease;
        }


        .block-about    { background: #2563eb; }
        .block-work     { background: #E794DA; }
        .block-contact  { background: #ff5941; }

        .block-about.hovered    { box-shadow: 0 0 0 4px rgba(37,99,235,0.35),  0 0 30px 8px rgba(37,99,235,0.55); }
        .block-work.hovered     { box-shadow: 0 0 0 4px rgba(231,148,218,0.45), 0 0 30px 8px rgba(231,148,218,0.65); }
        .block-contact.hovered  { box-shadow: 0 0 0 4px rgba(255,89,65,0.4),    0 0 30px 8px rgba(255,89,65,0.6); }

        .block .arrow {
            width: 0.85em;
            height: 0.85em;
            stroke: rgba(255,255,255,0.9);
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }

        .logo {
            position: absolute;
            top: 2rem;
            left: 2rem;
            z-index: 100;
        }

        .logo img { height: 50px; }

        @media (max-width: 768px) {
            .header-section { padding-top: 3rem; }
            .block { padding: 0.85rem 1.6rem; font-size: 1.05rem; gap: 0.4rem; }
            .block .arrow { width: 0.8em; height: 0.8em; }
            .logo { top: 1rem; left: 1rem; }
            .logo img { height: 40px; }
            .main-title { font-size: clamp(2.5rem, 13vw, 4rem); }
            .subtitle { font-size: 1rem; padding-top: 0.5rem; }
        }

        @media (max-width: 420px) {
            .block { padding: 0.7rem 1.3rem; font-size: 0.95rem; }
        }

        /* Aurora background */
        :root {
            --aurora-white: rgba(255,255,255,1);
            --aurora-transparent: rgba(255,255,255,0);
            --aurora-blue-500: #3b82f6;
            --aurora-indigo-300: #a5b4fc;
            --aurora-blue-300: #93c5fd;
            --aurora-violet-200: #ddd6fe;
            --aurora-blue-400: #60a5fa;
        }

        @keyframes aurora {
            from { background-position: 50% 50%, 50% 50%; }
            to   { background-position: 350% 50%, 350% 50%; }
        }

        .aurora-bg {
            position: absolute;
            inset: -10px;
            z-index: 0;
            pointer-events: none;
            opacity: 0.5;
            will-change: transform;
            background-image:
                repeating-linear-gradient(100deg,
                    var(--aurora-white) 0%, var(--aurora-white) 7%,
                    var(--aurora-transparent) 10%, var(--aurora-transparent) 12%,
                    var(--aurora-white) 16%),
                repeating-linear-gradient(100deg,
                    var(--aurora-blue-500) 10%, var(--aurora-indigo-300) 15%,
                    var(--aurora-blue-300) 20%, var(--aurora-violet-200) 25%,
                    var(--aurora-blue-400) 30%);
            background-size: 300%, 200%;
            background-position: 50% 50%, 50% 50%;
            filter: blur(10px) invert(1);
            -webkit-mask-image: radial-gradient(ellipse at 100% 0%, black 10%, transparent 70%);
            mask-image: radial-gradient(ellipse at 100% 0%, black 10%, transparent 70%);
        }

        .aurora-bg::after {
            content: "";
            position: absolute;
            inset: 0;
            background-image:
                repeating-linear-gradient(100deg,
                    var(--aurora-white) 0%, var(--aurora-white) 7%,
                    var(--aurora-transparent) 10%, var(--aurora-transparent) 12%,
                    var(--aurora-white) 16%),
                repeating-linear-gradient(100deg,
                    var(--aurora-blue-500) 10%, var(--aurora-indigo-300) 15%,
                    var(--aurora-blue-300) 20%, var(--aurora-violet-200) 25%,
                    var(--aurora-blue-400) 30%);
            background-size: 200%, 100%;
            background-attachment: fixed;
            mix-blend-mode: difference;
            animation: aurora 60s linear infinite;
        }
    </style>
</head>
<body>
    <di v class="main-container">
        <div class="aurora-bg"></div>
        <div class="logo">
            <img src="images/NK Black Logo (No BG).png" alt="NK">
        </div>

        <div class="header-section">
            <div class="main-title" id="bubble-title"></div>
            <p class="subtitle">visual storyteller</p>
        </div>

        <div id="physics-world" class="physics-container">
            <div id="block-about"    class="block block-about"><span>about</span><svg class="arrow" viewBox="0 0 24 24"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg></div>
            <div id="block-work"     class="block block-work"><span>my portfolio</span><svg class="arrow" viewBox="0 0 24 24"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg></div>
            <div id="block-contact"  class="block block-contact"><span>contact</span><svg class="arrow" viewBox="0 0 24 24"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg></div>
        </div>
    </div>

    <script>
        // Bubble text
        const titleEl = document.getElementById('bubble-title');
        const text = 'nicolas kwek';
        let hoveredIndex = null;

        const spans = text.split('').map((char, idx) => {
            const span = document.createElement('span');
            span.className = 'bubble-char';
            span.textContent = char === ' ' ? '\u00A0' : char;
            span.addEventListener('mouseenter', () => {
                hoveredIndex = idx;
                updateClasses();
            });
            titleEl.appendChild(span);
            return span;
        });

        titleEl.addEventListener('mouseleave', () => {
            hoveredIndex = null;
            updateClasses();
        });

        function updateClasses() {
            spans.forEach((span, idx) => {
                span.classList.remove('dist-0', 'dist-1', 'dist-2');
                if (hoveredIndex !== null) {
                    const dist = Math.abs(hoveredIndex - idx);
                    if (dist <= 2) span.classList.add('dist-' + dist);
                }
            });
        }
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/poly-decomp/0.3.0/decomp.min.js"></script>
    <script>
        const { Engine, Render, Runner, World, Bodies, Mouse, MouseConstraint, Common } = Matter;

        const container = document.getElementById('physics-world');
        const width  = container.clientWidth;
        const height = container.clientHeight;

        Common.setDecomp(window.decomp);

        const engine = Engine.create();
        engine.gravity.x = 0;
        engine.gravity.y = 1;

        const render = Render.create({
            element: container,
            engine: engine,
            options: {
                width,
                height,
                wireframes: false,
                background: 'transparent'
            }
        });

        // Make the canvas transparent to pointer events by default,
        // Matter will still receive mouse via its own mouse object
        render.canvas.style.pointerEvents = 'all';

        const mouse = Mouse.create(render.canvas);
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse,
            constraint: { stiffness: 0.2, render: { visible: false } }
        });

        const walls = [
            Bodies.rectangle(width / 2, height + 10, width, 20, { isStatic: true, friction: 1, render: { visible: false } }),
            Bodies.rectangle(width + 10, height / 2, 20, height, { isStatic: true, friction: 1, render: { visible: false } }),
            Bodies.rectangle(-10, height / 2, 20, height, { isStatic: true, friction: 1, render: { visible: false } })
        ];

        World.add(engine.world, [...walls, mouseConstraint]);
        render.mouse = mouse;

        const bodiesMap = new Map();

        function registerElement(id, element, x, y, link) {
            const w = element.offsetWidth;
            const h = element.offsetHeight;
            const body = Bodies.rectangle(x, y, w, h, {
                friction: 0.5,
                restitution: 0.2,
                render: { fillStyle: 'transparent', strokeStyle: 'transparent', lineWidth: 0 }
            });
            World.add(engine.world, [body]);
            bodiesMap.set(id, { element, body, link });
        }

        registerElement('block-about',    document.getElementById('block-about'),    width * 0.3,  height * 0.1, 'about.html');
        registerElement('block-work',     document.getElementById('block-work'),     width * 0.3,  height * 0.3, 'portfolio.html');
        registerElement('block-contact',  document.getElementById('block-contact'),  width * 0.75, height * 0.1, 'contact.html');

        function updateElements() {
            bodiesMap.forEach(({ element, body }) => {
                const { x, y } = body.position;
                const rotation = body.angle * (180 / Math.PI);
                element.style.transform = `translate(${x - element.offsetWidth / 2}px, ${y - element.offsetHeight / 2}px) rotate(${rotation}deg)`;
            });
            requestAnimationFrame(updateElements);
        }

        let clickStartTime, clickStartPos, isDragging = false;

        render.canvas.addEventListener('mousedown', (e) => {
            clickStartTime = Date.now();
            const rect = render.canvas.getBoundingClientRect();
            clickStartPos = { x: e.clientX - rect.left, y: e.clientY - rect.top };
            isDragging = false;
        });

        render.canvas.addEventListener('mousemove', (e) => {
            if (clickStartTime) {
                const rect = render.canvas.getBoundingClientRect();
                const cur = { x: e.clientX - rect.left, y: e.clientY - rect.top };
                if (Math.hypot(cur.x - clickStartPos.x, cur.y - clickStartPos.y) > 10) isDragging = true;
            }
        });

        render.canvas.addEventListener('mouseup', (e) => {
            if (!isDragging && Date.now() - clickStartTime < 300) {
                const rect = render.canvas.getBoundingClientRect();
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;
                bodiesMap.forEach(({ body, link }) => {
                    const b = body.bounds;
                    if (mx >= b.min.x && mx <= b.max.x && my >= b.min.y && my <= b.max.y)
                        window.location.href = link;
                });
            }
            isDragging = false;
            clickStartTime = null;
        });

        let mouseDown = false;
        const touchingMouse = () => Matter.Query.point(engine.world.bodies, mouseConstraint.mouse.position).length > 0;

        render.canvas.addEventListener('mousedown', () => { mouseDown = true; if (touchingMouse()) render.canvas.style.cursor = 'grabbing'; });
        render.canvas.addEventListener('mouseup',   () => { mouseDown = false; render.canvas.style.cursor = touchingMouse() ? 'grab' : 'default'; });
        Matter.Events.on(engine, 'beforeUpdate', () => {
            if (!mouseDown) render.canvas.style.cursor = touchingMouse() ? 'grab' : 'default';

            // Track which block (if any) is hovered, toggle .hovered class
            const hits = Matter.Query.point(engine.world.bodies, mouseConstraint.mouse.position);
            const hoveredBodyId = hits.length ? hits[0].id : null;
            bodiesMap.forEach(({ element, body }) => {
                element.classList.toggle('hovered', body.id === hoveredBodyId);
            });
        });

        // Pass mouse events through canvas to underlying elements when not over a physics body
        render.canvas.addEventListener('mousemove', (e) => {
            if (!touchingMouse()) {
                render.canvas.style.pointerEvents = 'none';
                setTimeout(() => { render.canvas.style.pointerEvents = 'all'; }, 0);
            }
        });

        const runner = Runner.create();
        Render.run(render);
        Runner.run(runner, engine);
        updateElements();

        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => location.reload(), 300);
        });
    </script>
</body>
</html>
